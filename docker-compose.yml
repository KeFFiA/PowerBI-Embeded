# Production-style local stack:
#   - backend: Node/Express embed-token API (no secrets in the image; supplied at runtime)
#   - frontend: nginx serving the built React app and proxying /api -> backend
#
# Build (installs all deps INSIDE the images, nothing on the host):
#   sudo docker compose build
# Run:
#   sudo docker compose up
# Then open http://localhost:8080

services:
  backend:
    build:
      context: ./backend
    image: powerbi-embed-backend:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "4000"
      # Allowlist is mounted at runtime (contains ids, not secrets).
      EMBED_ALLOWLIST_FILE: /run/config/allowlist.json
    volumes:
      - ./backend/allowlist.json:/run/config/allowlist.json:ro
      - ./backend/allowlist.dev.json:/run/config/allowlist.dev.json:ro
      - dashboard-configs:/app/data/configs
    expose:
      - "4000"
    # Uncomment to hit the API directly for debugging:
    # ports:
    #   - "4000:4000"

  frontend:
    build:
      context: ./frontend
    image: powerbi-embed-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  # Persists admin dashboard configs across container restarts and rebuilds.
  dashboard-configs:
